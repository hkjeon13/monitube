name: ${COMPOSE_PROJECT_NAME:-monitube}

x-app-environment: &app-environment
  APP_ENV: ${APP_ENV:-development}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql://monitube:change-me-local-only@postgres:5432/monitube}
  REDIS_URL: ${REDIS_URL_DOCKER:-redis://redis:6379/0}
  S3_ENDPOINT_URL: ${S3_ENDPOINT_URL_DOCKER:-http://minio:9000}
  S3_ACCESS_KEY: ${S3_ACCESS_KEY:-monitube-local}
  S3_SECRET_KEY: ${S3_SECRET_KEY:-change-me-minio-local-only}
  S3_BUCKET: ${S3_BUCKET:-monitube-local}
  S3_REGION: ${S3_REGION:-us-east-1}
  S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
  ENABLE_DERIVED_ANALYTICS: ${ENABLE_DERIVED_ANALYTICS:-false}

x-youtube-runtime-secret: &youtube-runtime-secret
  # The deployment script resolves this to a server-only, mode-0600 env file.
  # It is deliberately scoped to the services that need a YouTube credential.
  env_file:
    - ${MONITUBE_YOUTUBE_SECRET_ENV_FILE:-.env}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-monitube}
      POSTGRES_USER: ${POSTGRES_USER:-monitube}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-only}
    ports:
      - "${POSTGRES_BIND_ADDRESS:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # PostgreSQL executes this only when postgres_data is created for the
      # first time. Use a future migration runner for incremental migrations.
      - ./database/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_initial_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_BIND_ADDRESS:-127.0.0.1}:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-monitube-local}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me-minio-local-only}
    ports:
      - "${MINIO_BIND_ADDRESS:-127.0.0.1}:${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_BIND_ADDRESS:-127.0.0.1}:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      minio:
        condition: service_started
    environment:
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL_DOCKER:-http://minio:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-monitube-local}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-change-me-minio-local-only}
      S3_BUCKET: ${S3_BUCKET:-monitube-local}
    volumes:
      - ./infra/minio/create-bucket.sh:/usr/local/bin/create-bucket.sh:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/create-bucket.sh"]

  migrate:
    image: postgres:16-alpine
    restart: "no"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-monitube}
      POSTGRES_USER: ${POSTGRES_USER:-monitube}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-only}
    volumes:
      - ./database/migrations:/migrations:ro
      - ./scripts/apply_migrations.sh:/usr/local/bin/apply_migrations.sh:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/apply_migrations.sh"]
    depends_on:
      postgres:
        condition: service_healthy

  api:
    <<: *youtube-runtime-secret
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    restart: unless-stopped
    environment:
      <<: *app-environment
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    command: ["uv", "run", "--no-sync", "--directory", "apps/api", "uvicorn", "monitube_api.main:create_app", "--factory", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "${API_BIND_ADDRESS:-127.0.0.1}:${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  worker:
    <<: *youtube-runtime-secret
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    restart: unless-stopped
    environment:
      <<: *app-environment
      MONITUBE_API_BASE_URL: ${MONITUBE_API_BASE_URL:-http://api:8000}
      PYTHONPATH: /workspace/apps/api:/workspace/apps/worker
    command: ["python", "-m", "monitube_worker.worker"]
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      api:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api}
        NEXT_PUBLIC_API_REQUEST_TIMEOUT_MS: ${NEXT_PUBLIC_API_REQUEST_TIMEOUT_MS:-10000}
        MONITUBE_WEB_API_PROXY_TARGET: ${MONITUBE_WEB_API_PROXY_TARGET_DOCKER:-http://api:8000}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api}
      NEXT_PUBLIC_API_REQUEST_TIMEOUT_MS: ${NEXT_PUBLIC_API_REQUEST_TIMEOUT_MS:-10000}
      MONITUBE_WEB_API_PROXY_TARGET: ${MONITUBE_WEB_API_PROXY_TARGET_DOCKER:-http://api:8000}
    command: ["npm", "run", "start", "--", "--hostname", "0.0.0.0", "--port", "3000"]
    ports:
      - "${WEB_BIND_ADDRESS:-127.0.0.1}:${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:
